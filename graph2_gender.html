<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gender Equity</title>
<style>
  :root{--ink:#1c2533;--muted:#5c6675;--line:#e3e7ee;--accent:#6a4ea3;--rec-key:#3a8063;--bg:#f4f5f8;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;line-height:1.5;display:flex;justify-content:center}
  .chart-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:24px 16px;max-width:840px;width:100%;box-shadow:0 6px 24px rgba(30,40,60,.06)}
  .chart-title{font-size:16px;font-weight:700;margin:0 0 2px}
  .chart-note{font-size:12.5px;color:var(--muted);margin:0 0 10px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 12px;align-items:center}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);font:inherit;font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:999px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  svg{display:block;width:100%;height:auto;overflow:visible;touch-action:none}
  .tip{position:fixed;pointer-events:none;background:#1c2533;color:#fff;font-size:12.5px;padding:8px 11px;border-radius:9px;opacity:0;transition:opacity .12s;z-index:50;max-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.25);line-height:1.45}
  .tip .k{color:#9fb4d8}
  .reveal{font-size:13px;color:var(--rec-key);font-weight:600;margin-top:10px;min-height:18px}
  .tlab{fill:var(--muted);font-size:11px}.grid{stroke:#eceef3;stroke-width:1}.axis{stroke:#cdd4df;stroke-width:1}
</style>
</head><body>
<div class="chart-card">
  <p class="chart-title">Male vs. female athletes, 1896–2028 (unique athletes)</p>
  <p class="chart-note">Press play to watch the gap close. Hover any Games for the split and the female share; the crossover marks the first gender-balanced Games.</p>
  <div class="controls" id="ctl-gen"></div>
  <svg id="svg-gen" viewBox="0 0 760 380" role="img"></svg>
  <div class="reveal" id="rev-gen"></div>
</div>
<div class="tip" id="tip"></div>
<script>
const SVGNS="http://www.w3.org/2000/svg";const tip=document.getElementById('tip');
function el(t,a={}){const e=document.createElementNS(SVGNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function txt(e,s){e.textContent=s;return e;}
function showTip(html,evt){tip.innerHTML=html;tip.style.opacity=1;moveTip(evt);}
function moveTip(evt){const x=evt.clientX,y=evt.clientY;tip.style.left=Math.min(x+14,innerWidth-tip.offsetWidth-10)+'px';tip.style.top=(y-10-tip.offsetHeight)+'px';if(y-tip.offsetHeight<10)tip.style.top=(y+18)+'px';}
function hideTip(){tip.style.opacity=0;}
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function animate(dur,cb,done){const s=performance.now();function f(n){let t=Math.min(1,(n-s)/dur);cb(ease(t));if(t<1)requestAnimationFrame(f);else if(done)done();}requestAnimationFrame(f);}
function mkBtns(host,items,onpick){host.innerHTML='';const btns=[];items.forEach(it=>{const b=document.createElement('button');b.className='btn'+(it.on?' on':'');b.textContent=it.label;
  b.onclick=()=>{if(it.toggle){b.classList.toggle('on');onpick(it,b.classList.contains('on'),btns);}else{if(!it.act){btns.forEach(x=>{if(!x._toggle)x.classList.remove('on')});b.classList.add('on');}onpick(it,true,btns);}};b._toggle=!!it.toggle;host.appendChild(b);btns.push(b);});return btns;}

(function(){
  const d=[[1896,176,0],[1900,1206,23],[1904,650,6],[1908,1971,44],[1912,2359,48],[1920,2561,65],
    [1924,2954,135],[1928,2606,277],[1932,1206,126],[1936,3632,331],[1948,3714,390],[1952,4436,519],
    [1956,2938,376],[1960,4727,611],[1964,4473,678],[1968,4735,781],[1972,6075,1059],[1976,4824,1260],
    [1980,4064,1115],[1984,5263,1566],[1988,6197,2194],[1992,6652,2704],[1996,6806,3512],[2000,6582,4069],
    [2004,6296,4329],[2008,6305,4637],[2012,5892,4676],[2016,6179,5059],[2028,5596,5676]];
  const svg=document.getElementById('svg-gen'),W=760,H=380,m={l:50,r:62,t:22,b:38};
  const X=x=>m.l+(x-1896)/(2028-1896)*(W-m.l-m.r),Y=y=>H-m.b-y/8000*(H-m.t-m.b);
  let progress=1,playing=false,showShare=false;
  function draw(){svg.innerHTML='';
    for(let v=0;v<=8000;v+=2000){const y=Y(v);svg.appendChild(el('line',{x1:m.l,y1:y,x2:W-m.r,y2:y,class:'grid'}));svg.appendChild(txt(el('text',{x:m.l-8,y:y+4,'text-anchor':'end',class:'tlab'}),(v/1000)+'k'));}
    for(let yr=1900;yr<=2020;yr+=20)svg.appendChild(txt(el('text',{x:X(yr),y:H-m.b+18,'text-anchor':'middle',class:'tlab'}),yr));
    svg.appendChild(txt(el('text',{x:X(2028),y:H-m.b+18,'text-anchor':'middle',class:'tlab',fill:'#3a8063','font-weight':'700'}),"'28"));
    const cut=1896+(2028-1896)*progress,vis=d.filter(p=>p[0]<=cut+.01);
    function line(idx,color){if(vis.length<2)return;svg.appendChild(el('path',{d:vis.map((p,i)=>(i?'L':'M')+X(p[0])+' '+Y(p[idx])).join(' '),fill:'none',stroke:color,'stroke-width':3,'stroke-linejoin':'round'}));}
    line(1,'#2f7ed8');line(2,'#d6248f');
    if(vis.length){const lp=vis[vis.length-1];svg.appendChild(txt(el('text',{x:X(lp[0])+8,y:Y(lp[1])+4,class:'tlab',fill:'#2f7ed8','font-weight':'700'}),'Men'));
      svg.appendChild(txt(el('text',{x:X(lp[0])+8,y:Y(lp[2])+4,class:'tlab',fill:'#d6248f','font-weight':'700'}),'Women'));}
    if(progress>=1){const ring=el('circle',{cx:X(2028),cy:Y(5636),r:7,fill:'none',stroke:'#3a8063','stroke-width':2.5});
      svg.appendChild(el('circle',{cx:X(2028),cy:Y(5636),r:5,fill:'#3a8063',stroke:'#fff','stroke-width':1.5}));svg.appendChild(ring);
      animate(800,t=>{ring.setAttribute('r',7+t*18);ring.setAttribute('opacity',1-t);});
      svg.appendChild(txt(el('text',{x:X(2028),y:Y(5636)-14,'text-anchor':'middle',class:'tlab',fill:'#3a8063','font-weight':'700'}),'crossover'));}
    vis.forEach(p=>{const share=(p[2]/(p[1]+p[2])*100);[[1,'#2f7ed8','Men'],[2,'#d6248f','Women']].forEach(([i,col])=>{
      const c=el('circle',{cx:X(p[0]),cy:Y(p[i]),r:3.4,fill:col,stroke:'#fff','stroke-width':1.2,cursor:'pointer'});
      c.addEventListener('mouseenter',e=>{c.setAttribute('r',6.5);showTip(`<b>${p[0]}</b><br><span class="k">Men:</span> ${p[1].toLocaleString()}<br><span class="k">Women:</span> ${p[2].toLocaleString()}<br><span class="k">Female share:</span> ${share.toFixed(1)}%`,e);});
      c.addEventListener('mousemove',moveTip);c.addEventListener('mouseleave',()=>{c.setAttribute('r',3.4);hideTip();});svg.appendChild(c);});});
    if(showShare){const Ys=v=>H-m.b-v/100*(H-m.t-m.b);
      svg.appendChild(el('line',{x1:m.l,y1:Ys(50),x2:W-m.r,y2:Ys(50),stroke:'#cdb','stroke-width':1.4,'stroke-dasharray':'4 4'}));
      svg.appendChild(txt(el('text',{x:W-m.r+4,y:Ys(50)+4,class:'tlab',fill:'#3a8063'}),'50%'));
      svg.appendChild(el('path',{d:vis.map((p,i)=>(i?'L':'M')+X(p[0])+' '+Ys(p[2]/(p[1]+p[2])*100)).join(' '),fill:'none',stroke:'#3a8063','stroke-width':2,'stroke-dasharray':'5 4',opacity:.85}));
      svg.appendChild(txt(el('text',{x:X(2016),y:Ys(45)-6,'text-anchor':'end',class:'tlab',fill:'#3a8063','font-weight':'700'}),'female share %'));}}
  function play(){if(playing)return;playing=true;animate(2400,t=>{progress=t;draw();},()=>{playing=false;});}
  mkBtns(document.getElementById('ctl-gen'),[{label:'▶ Play convergence',act:'play'},{label:'Overlay female share %',toggle:true}],
    (it,on)=>{if(it.act==='play'){progress=0;play();}else{showShare=on;document.getElementById('rev-gen').textContent=on?'Female share: 22.9% (1984) → 45.0% (2016) → ~50.4% projected (2028). The same venues sized for a male-majority field now serve a 50/50 one.':'';draw();}});
  draw();
})();
addEventListener('scroll',hideTip,{passive:true});
</script>
</body></html>
